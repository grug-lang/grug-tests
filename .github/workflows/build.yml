name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.sanitizer }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [clang, gcc]
        sanitizer: [none, asan, valgrind]
        include:
          - os: windows-latest
            compiler: gcc
            sanitizer: none
          - os: windows-latest
            compiler: cl
            sanitizer: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        if: matrix.os == 'windows-latest' 
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Lark
        run: python -m pip install lark[interegular]

      - name: Run grammar check
        run: python grammar.py

      - name: Install Pyright
        run: python -m pip install pyright

      - name: Run Pyright type check
        run: |
          PY_MAJOR_MINOR=$(python - <<'EOF' | tr -d '\r'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )
          pyright --pythonversion "$PY_MAJOR_MINOR"

      - name: Install Valgrind (if needed)
        if: matrix.sanitizer == 'valgrind'
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Build and run tests (Debug + Release)
        run: |
          # Set sanitizer flags
          if [ "${{ matrix.sanitizer }}" == "asan" ]; then
            export ASAN=1
          fi
          if [ "${{ matrix.sanitizer }}" == "valgrind" ]; then
            export VALGRIND=1
          fi

          for BUILD_TYPE in Debug Release; do
            echo "=== Building $BUILD_TYPE ==="

            # The ,, lowercases it to build-debug and build-release
            export BUILD_DIR=build-${BUILD_TYPE,,} 
            
            CMAKE_FLAGS="-G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE"
            cmake -S . -B $BUILD_DIR $CMAKE_FLAGS
            cmake --build $BUILD_DIR

            echo "=== Running tests ($BUILD_TYPE) ==="
            TEST_EXE=$(find $BUILD_DIR -type f \( -name "smoketest" -o -name "smoketest.exe" \) | head -n 1)

            if [ ! -z "$VALGRIND" ]; then
              valgrind "$TEST_EXE"
            else
              "$TEST_EXE"
            fi
          done
        env:
          CC: ${{ matrix.compiler }}
          SHUFFLES: 10
