name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.sanitizer }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [clang, gcc]
        sanitizer: [none, asan, valgrind]
        include:
          - os: windows-latest
            compiler: clang
            sanitizer: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Lark
        run: pip install lark[interegular]

      - name: Run grammar check
        run: python grammar.py

      - name: Install Pyright
        run: pip install pyright

      - name: Run Pyright type check
        run: |
          PY_MAJOR_MINOR=$(python - <<'EOF' | tr -d '\r'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )
          pyright --pythonversion "$PY_MAJOR_MINOR"

      - name: Install Valgrind (if needed)
        if: matrix.sanitizer == 'valgrind'
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Configure CMake
        run: |
          # Use Ninja for everything. It's faster and respects the CC env var on Windows.
          CMAKE_FLAGS="-G Ninja"
          if [ "${{ matrix.sanitizer }}" == "asan" ]; then
            CMAKE_FLAGS="$CMAKE_FLAGS -DASAN=ON"
          fi
          cmake -S . -B ./build $CMAKE_FLAGS
        env:
          CC: ${{ matrix.compiler }}

      - name: Build smoke tests
        run: cmake --build ./build
        env:
          CC: ${{ matrix.compiler }}

      - name: Run smoke tests
        run: |
          TEST_EXE=$(find ./build -type f \( -name "smoketest" -o -name "smoketest.exe" \) | head -n 1)
          
          if [ "${{ matrix.sanitizer }}" == "valgrind" ]; then
            valgrind "$TEST_EXE"
          else
            "$TEST_EXE"
          fi
        env:
          CC: ${{ matrix.compiler }}
          ASAN: ${{ matrix.sanitizer == 'asan' && 1 || '' }}
          VALGRIND: ${{ matrix.sanitizer == 'valgrind' && 1 || '' }}
          SHUFFLES: 10
