name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.compiler }} ${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [clang, gcc]
        sanitizer: [none, asan, valgrind]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Lark
        run: pip install lark[interegular]

      - name: Run grammar check
        run: python grammar.py

      - name: Install Pyright
        run: pip install pyright

      - name: Run Pyright type check
        run: |
          PY_MAJOR_MINOR=$(python - <<'EOF'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )
          pyright --pythonversion "$PY_MAJOR_MINOR"

      - name: Install Valgrind (if needed)
        if: matrix.sanitizer == 'valgrind'
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Configure CMake
        run: |
          CMAKE_FLAGS=""
          if [ "${{ matrix.sanitizer }}" == "asan" ]; then
            CMAKE_FLAGS="-DASAN=ON"
          fi
          cmake -S . -B ./build $CMAKE_FLAGS
        env:
          CC: ${{ matrix.compiler }}

      - name: Build smoke tests
        run: cmake --build ./build
        env:
          CC: ${{ matrix.compiler }}

      - name: Run smoke tests
        run: |
          if [ "${{ matrix.sanitizer }}" == "valgrind" ]; then
            valgrind ./build/smoketest
          else
            ./build/smoketest
          fi
        env:
          CC: ${{ matrix.compiler }}
          ASAN: ${{ matrix.sanitizer == 'asan' && 1 || '' }}
          VALGRIND: ${{ matrix.sanitizer == 'valgrind' && 1 || '' }}
          SHUFFLES: 10
